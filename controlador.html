<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Master Control vMix PRO - Allan Gomes</title>
    <script src="bancodedados.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { 
            --primary: #f1c40f; --bg: #0a0a0a; --panel: #1a1a1a; 
            --text: #ffffff; --yellow: #f1c40f; --red: #ff4757; 
            --green: #2ecc71; --blue: #1e90ff; --border: #333;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .modal-box { background: #111; padding: 40px; border-radius: 12px; border: 2px solid var(--primary); text-align: center; max-width: 600px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .btn-modo { padding: 20px 30px; margin: 10px; font-size: 1.2rem; font-weight: 900; cursor: pointer; border-radius: 8px; border: none; text-transform: uppercase; width: 100%; transition: transform 0.2s; }
        .btn-modo:hover { transform: scale(1.05); }
        .btn-local { background: #444; color: white; border: 2px solid #666; }
        .btn-server { background: var(--green); color: black; box-shadow: 0 0 15px rgba(46, 204, 113, 0.4);}
        
        #statusConexao { font-size: 0.9rem; font-weight: bold; padding: 5px 10px; border-radius: 4px; background: #333; color: #aaa; }

        .main-layout { display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 20px; padding: 20px; flex-grow: 1; overflow: hidden; box-sizing: border-box; }

        .team-col { background: #111; border: 1px solid var(--border); border-radius: 12px; padding: 15px; display: flex; flex-direction: column; gap: 10px; transition: background 0.5s; position: relative; overflow: hidden; }
        .team-header-fixed { flex-shrink: 0; z-index: 10; position: relative; }

        .scrollable-list { flex-grow: 1; overflow-y: auto; overflow-x: hidden; padding-right: 5px; position: relative; z-index: 1; }
        .scrollable-list::-webkit-scrollbar { width: 6px; }
        .scrollable-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 4px; }
        .scrollable-list::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        .scrollable-list::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        table { width: 100%; border-spacing: 0 4px; border-collapse: separate; }
        .player-row { transition: all 0.2s; cursor: pointer; }
        .player-row td { padding: 4px; background: rgba(0,0,0,0.5); border: 1px solid transparent; }
        .player-row td:first-child { border-radius: 6px 0 0 6px; }
        .player-row td:last-child { border-radius: 0 6px 6px 0; }

        .radio-selector { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #555; display: inline-block; transition: 0.2s; margin-top: 3px; }

        .player-selected td { background: rgba(241, 196, 15, 0.25) !important; border-top: 1px solid var(--primary); border-bottom: 1px solid var(--primary); }
        .player-selected .radio-selector { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 10px var(--primary); }
        .player-sub-sai td { background: rgba(255, 71, 87, 0.25) !important; border-top: 1px solid var(--red); border-bottom: 1px solid var(--red); }
        .player-sub-sai .radio-selector { background: var(--red); border-color: var(--red); box-shadow: 0 0 10px var(--red); }
        .player-sub-entra td { background: rgba(46, 213, 113, 0.25) !important; border-top: 1px solid var(--green); border-bottom: 1px solid var(--green); }
        .player-sub-entra .radio-selector { background: var(--green); border-color: var(--green); box-shadow: 0 0 10px var(--green); }

        .team-action-bar { display: flex; gap: 5px; justify-content: center; background: rgba(0,0,0,0.7); padding: 8px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); margin-bottom: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }

        input { background: #333; border: 1px solid #444; color: white; padding: 5px; border-radius: 3px; font-size: 0.85rem; font-weight: bold; width: 100%; box-sizing: border-box; transition: 0.2s;}
        input:focus { outline: none; border-color: var(--primary); }
        .in-num { text-align: center; color: var(--primary); font-family: monospace; background: rgba(0,0,0,0.6); }
        .in-name { background: rgba(0,0,0,0.6); }
        
        /* NOVO CSS: Caixa de seleção da Posição do Jogador */
        .sel-pos { background: #222; color: var(--primary); border: 1px solid #444; border-radius: 4px; font-size: 0.75rem; font-weight: 900; width: 100%; padding: 4px 2px; text-align: center; cursor: pointer; outline: none; }
        .sel-pos:focus { border-color: var(--primary); }
        
        .btn-toggle-res { width: 100%; background: #222; color: #fff; padding: 12px; font-size: 0.9rem; font-weight: 900; border-radius: 6px; border: 1px solid #333; cursor: pointer; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; margin-top: 15px; flex-shrink: 0; }
        .btn-toggle-res:hover { background: #333; color: var(--primary); }
        .res-container { display: none; margin-top: 5px; border-top: 1px dashed #444; padding-top: 5px; }
        .res-container.show { display: block; }

        .center-col { display: flex; flex-direction: column; gap: 20px; overflow-y: auto; padding-right: 5px; }
        .top-grid { display: grid; grid-template-columns: 1fr 1.5fr 1fr; gap: 15px; }
        .box-time { background: #1a1a1a; padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #333; transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center; justify-content: center;}
        
        .timer-display { font-family: monospace; font-size: 3.5rem; color: var(--green); background: #000; padding: 5px 20px; border-radius: 8px; text-shadow: 0 0 15px rgba(46, 213, 115, 0.5); border: 2px solid #222; line-height: 1; margin-bottom: 10px;}
        .score-num { font-size: 4rem; font-weight: 900; background: #000; padding: 10px 30px; color: #fff; border-radius: 8px; border: 2px solid #333; line-height: 1;}

        .action-preview { background: #111; padding: 15px; border-radius: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; border: 1px solid var(--primary); margin-bottom: 10px; }
        .action-box h4 { margin: 0; color: var(--primary); font-size: 0.8rem; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 5px;}
        .display-action { font-size: 1.4rem; font-weight: 900; min-height: 1.5rem; display: flex; align-items: center; justify-content: center; background: #000; border-radius: 6px; padding: 10px; margin-top: 10px;}

        .btn-limpar-extra { background: var(--red) !important; color: white !important; border: none; padding: 5px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 0.8rem; text-transform: uppercase; }
        .btn-limpar-extra:hover { filter: brightness(1.2); }
        .btn-op { border: none; padding: 8px; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 0.9rem; flex-grow: 1; }

        .sticky-action-bar { background: #111; padding: 15px 20px; text-align: center; border-bottom: 2px solid var(--primary); flex-shrink: 0; z-index: 2000; position: sticky; top: 0; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.8); }
        .sticky-buttons { display: flex; gap: 15px; }
        .btn-take-topo { background: var(--green); color: #000; font-size: 1.2rem; font-weight: 900; padding: 10px 30px; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 0 #1b8a47; transition: all 0.1s; }
        .btn-take-topo:active { transform: translateY(4px); box-shadow: none; }
        .btn-ocultar-topo { background: #444; color: #fff; font-size: 1.2rem; font-weight: 900; padding: 10px 30px; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 0 #222; transition: all 0.1s; }
        .btn-ocultar-topo:active { transform: translateY(4px); box-shadow: none; }

        #toast-container { position: fixed; top: 90px; right: 20px; z-index: 10000; display: flex; flex-direction: column; gap: 10px; }
        .toast { padding: 15px 25px; border-radius: 8px; font-weight: 900; font-size: 1.1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.8); transition: opacity 0.5s ease-in-out; text-transform: uppercase; }
        
        .select-formacao { background: #222; color: #fff; border: 1px solid #444; padding: 4px; border-radius: 4px; font-weight: bold; margin-left: 10px;}
        .titulares-header { display: flex; justify-content: center; align-items: center; border-bottom: 2px solid rgba(255,255,255,0.3); padding-bottom:5px; margin:0; text-shadow: 1px 1px 2px #000; }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div id="modalModo" class="modal-overlay">
        <div class="modal-box">

            <button class="btn-take-topo" onclick="processUpdateMem()">▶ COLOCAR NO AR (TAKE)</button>
        </div>
    </div>

 

   <div class="main-layout">

                </div>
                
                <div class="team-action-bar" style="flex-wrap: wrap;">

                    <button class="btn-op" style="background:#8e44ad; color:#fff;" title="Definir Capitão" onclick="doAction('A', 'CAPITAO')">© CAP</button>

                            <option value="4-4-2 (Losango)">4-4-2 (Losango)</option>
                            <option value="4-2-3-1">4-2-3-1</option>
                            <option value="4-1-4-1">4-1-4-1</option>
                            <option value="3-5-2">3-5-2</option>
                            <option value="3-4-3">3-4-3</option>
                            <option value="5-3-2">5-3-2</option>
                            <option value="5-4-1">5-4-1</option>
                        </select>
                    </div>
                    <input type="text" id="tecnicoA" placeholder="Nome do Técnico" style="background: rgba(0,0,0,0.6); border: 1px solid #444; color: var(--primary); text-align: center; font-size: 0.8rem; padding: 4px; border-radius: 4px; width: 90%;">
                </div>
            </div>

            <div class="scrollable-list">

                <button class="btn-toggle-res" id="btn_res_A" onclick="toggleRes('resA_container')">RESERVAS <span>▼</span></button>
                <div id="resA_container" class="res-container"><table id="tA_res"></table></div>
            </div>

        <div class="center-col">

                    <div style="display:flex; gap:5px; margin-top:15px; width: 100%;">
                        <button class="btn-op" style="background:#fff; color:#000; font-size: 1.5rem; padding: 10px;" onclick="chScore('A',1)">+</button>

                    </div>
                </div>

                        <span style="font-size: 0.9rem; font-weight: bold; color: #ccc;">ACRÉS:</span>
                        <input type="number" id="extra" value="0" min="0" oninput="transmitData()" style="width:50px; text-align:center; height:35px; font-size:1.2rem; color: var(--yellow); font-weight: bold;">
                        <button class="btn-op" style="background:var(--yellow); color:black; font-size:0.8rem; height:35px;" onclick="transmitData(); showToast('Acréscimo Enviado!', 'var(--green)', 'black')">📡 ENVIAR</button>
                    </div>
                </div>

                        <button class="btn-op" style="background:rgba(0,0,0,0.6); color:#fff; border: 1px solid #555; font-size: 1.5rem; padding: 10px;" onclick="chScore('B',-1)">-</button>
                    </div>
                </div>
            </div>

            <div class="action-preview" style="grid-template-columns: 1fr; margin-bottom: 0;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div style="background: transparent; border: none; padding: 0;">
                        <h4 style="margin: 0; color: var(--primary); font-size: 0.8rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 5px;">SUBSTITUIÇÃO <button class="btn-limpar-extra" onclick="clearSub()">LIMPAR [X]</button></h4>
                        <div class="display-action">
                            <span style="color:var(--red)" id="subSai">---</span> 
                            <span style="margin: 0 15px;">⇄</span> 
                            <span style="color:var(--green)" id="subEntra">---</span>
                        </div>
                    </div>
                    <div style="background: transparent; border: none; padding: 0;">
                        <h4 style="margin: 0; color: var(--primary); font-size: 0.8rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 5px;">EVENTO ATUAL <button class="btn-limpar-extra" onclick="clearCardPreview()">LIMPAR [X]</button></h4>
                        <div class="display-action" id="cardEvent" style="color:var(--primary)">---</div>
                    </div>
                </div>
            </div>

            <div class="action-preview" style="grid-template-columns: 1fr; border-color: #3498db; margin-top: 10px;">

        </div>

        let m = Math.floor(tSec/60), s = tSec%60; document.getElementById('timer').innerText = (m<10?'0'+m:m)+":"+(s<10?'0'+s:s);

        for (let i = 1; i <= 11; i++) { const num = document.getElementById(`${team}_t_n_${i}`).value; const nomeFull = document.getElementById(`${team}_t_m_${i}`).value; const nomeLimpo = nomeFull.replace(/[⚽🟨🟥▶⇄]/g, '').trim(); const tagPos = document.getElementById(`${team}_t_p_${i}`).value; listaJogadores.push({ index: i, numero: num, nome: nomeLimpo, posicaoTatica: tagPos }); }
        cardDataEnvio = { tipo: 'CAMPO_TODOS', time: nomeTime, escudos: info ? info.logo : "", cor: info ? info.cor : "#ffffff", tecnico: tecnico, jogadores: listaJogadores, timestamp: Date.now() }; 
        transmitData(); showToast("Campo Completo no Ar!", "#27ae60", "white");
    }

    function prepararEscalacao(team, idNum, idNom, indexRow) {
        const numTxt = document.getElementById(idNum).value; const nomeFull = document.getElementById(idNom).value; const nomeClean = nomeFull.replace(/[⚽🟨🟥▶⇄]/g, '').trim(); const tecnico = document.getElementById('tecnico' + team).value; const nomeTime = document.getElementById('name' + team).value; const info = getTeamInfo(nomeTime);
        let tagPosicao = "GL"; if (indexRow <= 11) { const selectPos = document.getElementById(team + '_t_p_' + indexRow); if (selectPos) tagPosicao = selectPos.value; }
        cardDataEnvio = { tipo: 'ESCALAR', index: indexRow, posicaoTatica: tagPosicao, numero: numTxt, jogador: nomeClean, time: nomeTime, escudos: info ? info.logo : "", cor: info ? info.cor : "#ffffff", tecnico: tecnico, timestamp: Date.now() }; 
        transmitData(); showToast(nomeClean + " na Pos: " + tagPosicao, "#6c5ce7", "white");
    }
    
    function prepSub(idN, idM) { const valFull = document.getElementById(idM).value; const valClean = valFull.replace(/[⚽🟨🟥▶⇄]/g, '').trim(); const row = document.getElementById(idM).closest('tr'); if (!pendingSub.saiID_Nom) { pendingSub.saiID_Num = idN; pendingSub.saiID_Nom = idM; document.getElementById('subSai').innerText = valClean; if(row) row.classList.add('player-sub-sai'); } else { pendingSub.entID_Num = idN; pendingSub.entID_Nom = idM; document.getElementById('subEntra').innerText = valClean; if(row) row.classList.add('player-sub-entra'); } }

    function handleSubLogic() { if (pendingSub.saiID_Nom && pendingSub.entID_Nom) { const inputTitNum = document.getElementById(pendingSub.saiID_Num); const inputTitNom = document.getElementById(pendingSub.saiID_Nom); const inputResNum = document.getElementById(pendingSub.entID_Num); const inputResNom = document.getElementById(pendingSub.entID_Nom); if(inputTitNum && inputTitNom && inputResNum && inputResNom) { const tNumBkp = inputTitNum.value; const tNomBkp = inputTitNom.value.replace(/[▶⇄]/g, '').trim(); const rNumBkp = inputResNum.value; const rNomBkp = inputResNom.value.replace(/[▶⇄]/g, '').trim(); inputTitNum.value = rNumBkp; inputTitNom.value = rNomBkp + " ▶"; inputResNum.value = tNumBkp; inputResNom.value = tNomBkp + " ⇄"; const t = pendingSub.saiID_Nom.charAt(0); const nomeTime = document.getElementById('name'+t).value; const info = getTeamInfo(nomeTime); cardDataEnvio = { tipo: 'SUB', sai: tNomBkp, entra: rNomBkp, time: nomeTime, escudos: info ? info.logo : "", cor: info ? info.cor : "#ffffff", timestamp: Date.now() }; } } }

    function enviarEstatistica(tipoStat) { const pub = document.getElementById('inPublico').value; const ren = document.getElementById('inRenda').value; if(tipoStat === 'PUBLICO' && !pub) { alert("Preencha o Público!"); return; } if(tipoStat === 'RENDA' && !ren) { alert("Preencha a Renda!"); return; } document.getElementById('cardEvent').innerText = "PREPARADO: " + (tipoStat === 'PUBLICO' ? 'PÚBLICO' : 'RENDA'); cardDataEnvio = { tipo: 'ESTATISTICA', info: tipoStat, valor: tipoStat === 'PUBLICO' ? pub : ren, timestamp: Date.now() }; showToast(tipoStat + " PREPARADO!", "var(--blue)", "white"); }
    </script>
</html>
