<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Eventos Inferiores - Transmissão Premium</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,800;0,900;1,900&display=swap');

        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background-color: #00FF00; 
            display: flex; justify-content: center; align-items: flex-end; 
            height: 100vh;
            font-family: 'Montserrat', sans-serif;
        }

        /* =========================================================
           VINHETA TELA CHEIA
           ========================================================= */
        #intro-torneio {
            position: absolute; top: 0; left: 0; width: 1920px; height: 1080px;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 60%, transparent 100%);
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease-out; z-index: 999;
        }
        #intro-torneio.show { opacity: 1; }
        #logoTorneioGigante { height: 600px; width: auto; object-fit: contain; opacity: 0; transform-origin: bottom center; }

        @keyframes releaseEvent {
            0% { transform: translate(-450px, -450px) scale(0.1); opacity: 0; }
            10% { transform: translate(-450px, -450px) scale(0.15); opacity: 1; filter: drop-shadow(0 0 20px #f1c40f); }
            40% { transform: translate(0, -50px) scale(1); opacity: 1; filter: drop-shadow(0 25px 50px rgba(241,196,15,0.8)); }
            65% { transform: translate(0, -50px) scale(1.05); opacity: 1; filter: drop-shadow(0 25px 50px rgba(241,196,15,1)); }
            80% { transform: translate(0, 300px) scaleX(0.8) scaleY(1.3); opacity: 1; filter: drop-shadow(0 10px 20px rgba(241,196,15,0.8)); }
            85% { transform: translate(0, 480px) scaleX(1.5) scaleY(0.2); opacity: 1; }
            88% { transform: translate(0, 480px) scale(0); opacity: 0; }
            100% { transform: translate(0, 480px) scale(0); opacity: 0; }
        }
        #logoTorneioGigante.animate { animation: releaseEvent 2s cubic-bezier(0.25, 1, 0.5, 1) forwards; }

        /* =========================================================
           TARJAS INFERIORES
           ========================================================= */
        .cards-gigantes-wrapper {
            position: absolute; bottom: 80px; left: 50%; 
            transform: translateX(-50%) translateY(80px) scale(0.95); 
            opacity: 0; 
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1.05);
            width: 80%; max-width: 1400px; display: flex; justify-content: center; z-index: 50;
        }
        .cards-gigantes-wrapper.visible { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }

        .card-master {
            position: relative; display: none; width: 100%;
            background: linear-gradient(135deg, rgba(15,15,15,0.96) 0%, rgba(5,5,5,0.98) 100%);
            border-radius: 15px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 2px 10px rgba(255,255,255,0.08);
            overflow: hidden;
            border-left: 18px solid var(--cor-time, #3498db);
            padding: 35px 55px;
        }
        .card-master.active { display: block; }

        .watermark-logo { position: absolute; right: -2%; top: 50%; transform: translateY(-50%); height: 220%; opacity: 0.18; z-index: 1; pointer-events: none; object-fit: contain; }
        .content-z { position: relative; z-index: 2; width: 100%; }

        .evt-label { font-size: 2.2rem; font-weight: 900; letter-spacing: 5px; margin: 0 0 5px 0; text-shadow: 2px 2px 5px rgba(0,0,0,0.9); }
        .evt-team { font-size: 5.5rem; font-weight: 900; margin: 0; line-height: 1; color: #fff; text-shadow: 0 5px 15px rgba(0,0,0,0.9); text-transform: uppercase; }

        /* --- NOVO DESIGN DO CARTÃO --- */
        .cartao-flex { display: flex; align-items: center; gap: 40px; }
        
        .shape-cartao {
            width: 100px; height: 150px; border-radius: 10px;
            background: var(--cor-cartao);
            box-shadow: 0 0 30px var(--cor-cartao), inset 0 0 20px rgba(0,0,0,0.3);
            border: 4px solid #fff;
            transform: rotate(-5deg);
            animation: popCartao 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popCartao { 0% { transform: scale(0) rotate(20deg); } 100% { transform: scale(1) rotate(-5deg); } }

        .sub-name { 
            font-size: 2.8rem; font-weight: 900; color: #fff; text-transform: uppercase; 
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8); line-height: 1.15; max-width: 480px; 
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; text-overflow: ellipsis; white-space: normal;
        }

        .card-estatistica { text-align: center; border-left: none; border-bottom: 15px solid var(--cor-stat, #3498db); }
    </style>
</head>
<body>

    <div id="intro-torneio">
        <img id="logoTorneioGigante" src="" alt="Torneio">
    </div>
    
    <div class="cards-gigantes-wrapper" id="masterContainerCards">
        
        <div class="card-master" id="painelGol">
            <img class="watermark-logo" id="golLogoBg" src="">
            <div class="content-z">
                <p class="evt-label" style="color: #f1c40f">⚽ GOL DO</p>
                <p class="evt-team" id="golTime">TIME</p>
            </div>
        </div>
        
        <div class="card-master" id="painelSub">
            <img class="watermark-logo" id="subLogoBg" src="">
            <div class="content-z">
                <div style="margin-bottom: 25px; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 20px;">
                    <p class="evt-label" style="color: var(--cor-time, #3498db)">⇄ SUBSTITUIÇÃO</p>
                    <p class="evt-team" id="subTeamNameDisplay">TIME</p>
                </div>
                <div id="subPlayersList"></div>
            </div>
        </div>

        <!-- CARD CARTÃO ATUALIZADO -->
        <div class="card-master" id="painelCartao">
            <img class="watermark-logo" id="cartaoLogoBg" src="">
            <div class="content-z cartao-flex">
                <div class="shape-cartao" id="cartaoFisico"></div>
                <div>
                    <p class="evt-label" id="cartaoTitulo" style="color: #fff; opacity: 0.8; letter-spacing: 2px;"></p>
                    <p class="evt-team" id="cartaoJogador" style="font-size: 5rem;"></p>
                </div>
            </div>
        </div>

        <div class="card-master card-estatistica" id="painelEstatistica">
            <div class="content-z">
                <p class="evt-label" id="statTitulo" style="color: var(--cor-stat, #3498db)">PÚBLICO TOTAL</p>
                <p class="evt-team" id="statValor" style="font-size: 7.5rem;">0</p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
    const CAMINHO_WEB = "https://raw.githubusercontent.com/allangomess16-stack/Controle_Estadio/main/escudos/";
    document.getElementById('logoTorneioGigante').src = CAMINHO_WEB + "Escudo%20torneio.png";

    function getWebUrl(c) { if (!c) return ""; let n = c.split('/').pop(); return CAMINHO_WEB + encodeURIComponent(n); }

    const firebaseConfig = {
      apiKey: "AIzaSyCJzbXFhkPKEMa17YuEGjJtIhAysE1_HrI",
      authDomain: "licenciamento-72391.firebaseapp.com",
      databaseURL: "https://licenciamento-72391-default-rtdb.firebaseio.com",
      projectId: "licenciamento-72391",
      storageBucket: "licenciamento-72391.firebasestorage.app",
      messagingSenderId: "569680385303",
      appId: "1:569680385303:web:50c9e3a1cee0fcf987d352",
      measurementId: "G-LBHK8F648S"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let lastEventTimestamp = 0;

    function playEventIntro(cb) {
        const b = document.getElementById('intro-torneio'), i = document.getElementById('logoTorneioGigante');
        document.getElementById('masterContainerCards').classList.remove('visible');
        b.classList.add('show'); i.classList.remove('animate'); void i.offsetWidth; i.classList.add('animate');
        setTimeout(cb, 1700); setTimeout(() => b.classList.remove('show'), 1700);
    }

    db.ref('transmissao/vMixData').on('value', (s) => {
        const j = s.val(); if(!j) return;
        const c = document.getElementById('masterContainerCards');
        if (!j.eventoCard || j.eventoCard.tipo === 'OCULTAR' || j.routeEventos === false) { c.classList.remove('visible'); return; } 
        if (j.eventoCard.timestamp === lastEventTimestamp) return;
        
        lastEventTimestamp = j.eventoCard.timestamp;
        playEventIntro(() => {
            document.querySelectorAll('.card-master').forEach(p => p.classList.remove('active'));

            if (j.eventoCard.tipo === 'CARTAO') {
                document.documentElement.style.setProperty('--cor-cartao', j.eventoCard.corCartao);
                document.documentElement.style.setProperty('--cor-time', j.eventoCard.cor);
                if(j.eventoCard.escudo) document.getElementById('cartaoLogoBg').src = getWebUrl(j.eventoCard.escudo);
                document.getElementById('cartaoTitulo').innerText = j.eventoCard.textoCartao;
                document.getElementById('cartaoJogador').innerText = (j.eventoCard.numero ? j.eventoCard.numero + " - " : "") + j.eventoCard.jogador;
                document.getElementById('painelCartao').classList.add('active');
            } 
            else if (j.eventoCard.tipo === 'GOL') {
                document.documentElement.style.setProperty('--cor-time', j.eventoCard.cor);
                document.getElementById('golLogoBg').src = getWebUrl(j.eventoCard.escudo);
                document.getElementById('golTime').innerText = j.eventoCard.time;
                document.getElementById('painelGol').classList.add('active');
            }
            // ... (Demais lógicas de SUB e STAT mantidas conforme versão anterior)
            c.classList.add('visible');
        });
    });
    </script>
</body>
</html>
