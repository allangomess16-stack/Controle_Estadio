<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Escalação vMix PRO - Allan Gomes</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&display=swap');
        
        :root {
            --cor-time: #ffffff;
            --cor-arb: #ffd700; /* Dourado 3D */
            --cor-arb-dark: #b38f00;
        }

        * { box-sizing: border-box; }

        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background-color: #00FF00; /* Chroma Key */
            font-family: 'Montserrat', sans-serif; 
            color: white;
            width: 1920px;
            height: 1080px;
        }

        #intro-container {
            position: absolute; top: 0; left: 0; width: 1920px; height: 1080px;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, rgba(0,0,0,1) 0%, rgba(0,0,0,0.7) 60%, transparent 100%);
            opacity: 0; pointer-events: none; transition: opacity 0.5s; z-index: 999;
        }
        #intro-container.show { opacity: 1; }
        
        #intro-escudo {
            height: 1080px; width: auto; object-fit: contain;
            filter: drop-shadow(0 25px 35px rgba(0,0,0,1));
            transform: scale(1.1); opacity: 0;
        }

        @keyframes fullScreenImpact {
            0% { transform: scale(1.1); opacity: 0; filter: blur(20px); }
            15% { transform: scale(1); opacity: 1; filter: blur(0); }
            40% { transform: scale(1.03); }
            100% { transform: scale(1); opacity: 1; filter: blur(0); }
        }
        #intro-escudo.animate { 
            animation: fullScreenImpact 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
        }

        #headerTime {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(90deg, rgba(0,0,0,0.95) 0%, rgba(30,30,30,0.9) 100%);
            border-bottom: 6px solid var(--cor-time);
            padding: 15px 60px; border-radius: 20px;
            opacity: 0; transition: opacity 0.5s, transform 0.5s;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9); z-index: 100;
        }
        #headerTime.visible { opacity: 1; }
        #escudoHeader { width: 100px; height: 100px; margin-right: 30px; object-fit: contain; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.8)); }
        #nomeHeader { font-size: 4rem; font-weight: 900; text-transform: uppercase; letter-spacing: 4px; text-shadow: 3px 3px 15px rgba(0,0,0,0.9); }

        /* =========================================================
           TELAS DE ESCALAÇÃO (LISTA E CAMPO)
           ========================================================= */
        #listaView {
            position: absolute; top: 210px; left: 50%; transform: translateX(-50%);
            width: 700px; opacity: 0; transition: opacity 0.5s, width 0.5s; z-index: 50;
        }
        #listaView.show { opacity: 1; }
        .lista-info-top {
            background: linear-gradient(90deg, rgba(20,20,20,0.95), rgba(0,0,0,0.95)); 
            padding: 15px 30px; border-radius: 12px 12px 0 0;
            border-top: 5px solid var(--cor-time); margin-bottom: 8px;
            display: flex; justify-content: space-between; font-weight: 900; font-size: 1.2rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        
        #listaJogadoresGrid { display: flex; flex-direction: column; gap: 8px; }
        
        .lista-item {
            display: flex; align-items: center; background: rgba(10,10,10,0.9);
            border-left: 10px solid var(--cor-time); padding: 12px 25px; border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
        }
        
        .lista-num { 
            font-size: 2.2rem; font-weight: 900; color: #000; width: 60px; text-align: center; 
            text-shadow: -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 2px 2px 0 #fff, 0 -2px 0 #fff, 0 2px 0 #fff, -2px 0 0 #fff, 2px 0 0 #fff, 3px 3px 10px rgba(0,0,0,0.8);
        }
        .lista-nome { font-size: 2.2rem; font-weight: 800; margin-left: 20px; text-transform: uppercase; letter-spacing: 1px; }
        
        #campoView {
            position: absolute; top: 200px; left: 50%; transform: translateX(-50%);
            width: 1000px; height: 800px; 
            background: radial-gradient(circle, rgba(30,30,30,0.9) 0%, rgba(0,0,0,0.95) 100%);
            border: 5px solid var(--cor-time); border-radius: 40px;
            opacity: 0; transition: opacity 0.5s; z-index: 50;
            box-shadow: 0 25px 60px rgba(0,0,0,0.9);
            overflow: hidden;
        }
        #campoView.show { opacity: 1; }
        .campo-linhas { position: absolute; width: 90%; height: 90%; top: 5%; left: 5%; border: 3px solid rgba(255,255,255,0.15); border-radius: 15px; pointer-events: none; }
        .campo-meio { position: absolute; width: 100%; height: 3px; background: rgba(255,255,255,0.15); top: 50%; left: 0; }
        .campo-circulo { position: absolute; width: 180px; height: 180px; border: 3px solid rgba(255,255,255,0.15); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        
        #tec-box-campo {
            position: absolute; bottom: 25px; right: 25px; background: rgba(0,0,0,0.9); 
            padding: 10px 30px; border-radius: 20px; border: 3px solid var(--cor-time); 
            font-weight: 900; font-size: 1.2rem; text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8); z-index: 40;
        }

        .slot-jogador {
            position: absolute; transform: translate(-50%, -50%) scale(0);
            display: flex; flex-direction: column; align-items: center; z-index: 60;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .slot-jogador.placed { transform: translate(-50%, -50%) scale(1); }
        .slot-num {
            background: var(--cor-time); color: #000; font-weight: 900; 
            width: 50px; height: 50px; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 1.8rem; border: 4px solid #fff; margin-bottom: 6px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.8);
            text-shadow: -1.5px -1.5px 0 #fff, 1.5px -1.5px 0 #fff, -1.5px 1.5px 0 #fff, 1.5px 1.5px 0 #fff, 0 -1.5px 0 #fff, 0 1.5px 0 #fff, -1.5px 0 0 #fff, 1.5px 0 0 #fff;
        }
        .slot-nome {
            background: rgba(0,0,0,0.95); padding: 6px 12px; border-radius: 10px; 
            font-size: 1.15rem; font-weight: 900; 
            border: 2px solid #444; text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8);
            max-width: 160px; white-space: normal; line-height: 1.1; text-align: center;
        }
        .capitao-slot { z-index: 70; }
        .capitao-slot .slot-num { border: 4px solid #f1c40f; box-shadow: 0 8px 20px rgba(241, 196, 15, 0.8); transform: scale(1.15); }
        .capitao-slot .slot-nome { border: 2px solid #f1c40f; color: #f1c40f; text-shadow: 1px 1px 2px #000; }

        #highlight-card {
            position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(200%);
            background: linear-gradient(90deg, rgba(0,0,0,0.95) 0%, rgba(40,40,40,0.9) 100%);
            border: 5px solid var(--cor-time); border-radius: 25px;
            padding: 30px 80px; display: flex; align-items: center; gap: 50px;
            opacity: 0; transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 200;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }
        #highlight-card.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        #hl-num { font-size: 6rem; font-weight: 900; color: var(--cor-time); text-shadow: 3px 3px 15px rgba(0,0,0,0.9); }
        #hl-nome { font-size: 5rem; font-weight: 900; text-transform: uppercase; color: #fff; text-shadow: 3px 3px 10px rgba(0,0,0,0.8);}

        /* =========================================================
           TELA DE ARBITRAGEM (COLUNAS BLOQUEADAS E 3D MODERNO)
           ========================================================= */
        #arbitragem-card {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
            background: linear-gradient(135deg, #1f1f1f 0%, #050505 100%);
            border-radius: 25px;
            padding: 50px 60px; width: 1500px; /* Largura Total da Cartela */
            opacity: 0; z-index: 250;
            
            border-top: 2px solid rgba(255,255,255,0.15);
            border-left: 2px solid rgba(255,255,255,0.1);
            border-bottom: 2px solid #000;
            border-right: 2px solid #000;
            box-shadow: 40px 40px 80px rgba(0,0,0,0.9), -10px -10px 30px rgba(255,255,255,0.03), inset 0 0 50px rgba(0,0,0,0.8);
            
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        #arbitragem-card.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        
        .arb-titulo { 
            text-align: center; 
            background: linear-gradient(to bottom, var(--cor-arb), var(--cor-arb-dark)); 
            color: #000; font-size: 2.2rem; font-weight: 900; 
            margin: 0 auto 40px auto; letter-spacing: 4px; padding: 12px 60px; 
            border-radius: 50px; width: fit-content; text-transform: uppercase; 
            border: 2px solid #ffea00; border-bottom: 6px solid #806600;
            box-shadow: 0 15px 25px rgba(0,0,0,0.6), inset 0 3px 6px rgba(255,255,255,0.8);
            text-shadow: 1px 1px 0px rgba(255,255,255,0.4);
        }
        
        /* BLOQUEIO RÍGIDO DE COLUNAS (50% Exatos para cada lado) */
        .arb-grid { display: grid; gap: 25px 40px; justify-content: center; width: 100%; }
        .arb-grid.col-2 { 
            /* minmax(0, 1fr) força o Grid a não estourar o limite mesmo com textos enormes */
            grid-template-columns: repeat(2, minmax(0, 1fr)); 
        }
        .arb-grid.col-1 { grid-template-columns: minmax(0, 1fr); max-width: 900px; margin: 0 auto; }
        
        .arb-row { 
            background: linear-gradient(to bottom, #2a2a2a, #111);
            border-radius: 12px;
            padding: 15px 25px 15px 35px;
            display: flex; align-items: center; gap: 25px; 
            position: relative;
            border: 1px solid #000; border-top: 1px solid #444;
            box-shadow: 0 12px 20px rgba(0,0,0,0.6), inset 0 2px 4px rgba(255,255,255,0.1);
            width: 100%;
            min-width: 0; /* Essencial para flex/grid não estourar */
        }

        .arb-row::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 12px;
            background: linear-gradient(to right, var(--cor-arb), var(--cor-arb-dark));
            border-right: 1px solid #000; border-radius: 12px 0 0 12px;
            box-shadow: inset 2px 0 5px rgba(255,255,255,0.6);
        }
        
        .arb-emoji { font-size: 3.5rem; flex-shrink: 0; filter: drop-shadow(3px 5px 5px rgba(0,0,0,0.6)); }
        
        .arb-text { 
            display: flex; flex-direction: column; justify-content: center; 
            flex: 1; /* Ocupa todo o espaço restante do row */
            text-align: left; 
            min-width: 0; /* Impede que o texto estique a coluna pai */
        }
        
        .arb-cargo { 
            color: var(--cor-arb); font-size: 1.1rem; font-weight: 900; 
            text-transform: uppercase; letter-spacing: 2px; margin-bottom: 2px; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; /* Cargo sempre em 1 linha */
        }
        
        .arb-nome { 
            color: #fff; font-size: 1.7rem; font-weight: 900; text-transform: uppercase; 
            text-shadow: 2px 2px 4px #000; line-height: 1.25; 
            
            /* CONFIGURAÇÃO DE QUEBRA: Máximo de 2 linhas, com "..." se passar disso */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: normal;
            overflow-wrap: break-word; 
            word-wrap: break-word;
        }
    </style>
</head>
<body>

    <div id="intro-container"><img id="intro-escudo" src=""></div>
    <div id="headerTime"><img id="escudoHeader" src=""><span id="nomeHeader"></span></div>
    
    <div id="listaView">
        <div class="lista-info-top"><span id="formacaoLabel"></span><span id="tecNomeLista"></span></div>
        <div id="listaJogadoresGrid"></div>
    </div>

    <div id="campoView">
        <div class="campo-linhas"></div><div class="campo-meio"></div><div class="campo-circulo"></div>
        <div id="tec-box-campo"></div>
    </div>

    <div id="highlight-card"><div id="hl-num"></div><div id="hl-nome"></div></div>

    <!-- CONTÊINER DA ARBITRAGEM -->
    <div id="arbitragem-card"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAeWhpLh1tO_axQSDtckMVyoE-f4Egno8A",
            authDomain: "controladoravmixestadio.firebaseapp.com",
            databaseURL: "https://controladoravmixestadio-default-rtdb.firebaseio.com",
            projectId: "controladoravmixestadio",
            storageBucket: "controladoravmixestadio.firebasestorage.app",
            messagingSenderId: "381624685560",
            appId: "1:381624685560:web:61266ebc5e5031d717bc0d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const mapaTatico = {
            'GL': { top: '88%', left: '50%' }, 
            'LD': { top: '74%', left: '88%' }, 'LE': { top: '74%', left: '12%' }, 
            'ZGD': { top: '74%', left: '70%' }, 'ZGC': { top: '74%', left: '50%' }, 'ZGE': { top: '74%', left: '30%' },
            'ALD': { top: '58%', left: '88%' }, 'ALE': { top: '58%', left: '12%' },
            'VOLD': { top: '58%', left: '70%' }, 'VOLC': { top: '58%', left: '50%' }, 'VOLE': { top: '58%', left: '30%' }, 
            'MD': { top: '42%', left: '88%' }, 'ME': { top: '42%', left: '12%' }, 
            'MEIAD': { top: '42%', left: '70%' }, 'MEIAC': { top: '42%', left: '50%' }, 'MEIAE': { top: '42%', left: '30%' },
            'PD': { top: '24%', left: '85%' }, 'PE': { top: '24%', left: '15%' },
            'ATAD': { top: '20%', left: '65%' }, 'ATAE': { top: '20%', left: '35%' }, 
            'CA': { top: '12%', left: '50%' }
        };

        const campoView = document.getElementById('campoView');
        const listaView = document.getElementById('listaView');
        const highlightCard = document.getElementById('highlight-card');
        const arbCard = document.getElementById('arbitragem-card');

        let currentHighlightTimer = null;
        let lastEventTimestamp = 0;

        function ocultarTodasAsTelas() {
            campoView.classList.remove('show');
            listaView.classList.remove('show');
            highlightCard.classList.remove('show');
            arbCard.classList.remove('show');
            document.getElementById('headerTime').classList.remove('visible');
        }

        function playIntroAnimation(dadosEsc, callbackFinal) {
            ocultarTodasAsTelas();
            document.documentElement.style.setProperty('--cor-time', dadosEsc.cor);
            document.getElementById('escudoHeader').src = dadosEsc.escudo;
            document.getElementById('nomeHeader').innerText = dadosEsc.time;

            const introCont = document.getElementById('intro-container');
            const introEscudo = document.getElementById('intro-escudo');
            introEscudo.src = dadosEsc.escudo;
            introCont.classList.add('show');
            
            introEscudo.classList.remove('animate');
            void introEscudo.offsetWidth;
            setTimeout(() => introEscudo.classList.add('animate'), 50);

            setTimeout(() => {
                introEscudo.classList.remove('animate');
                introCont.classList.remove('show');
                setTimeout(() => { 
                    document.getElementById('headerTime').classList.add('visible'); 
                    callbackFinal(); 
                }, 500); 
            }, 3500); 
        }

        function criarMiniCard(dados, overrideTop = null, overrideLeft = null) {
            const idExistente = document.getElementById('slot_index_' + dados.index); 
            if(idExistente) idExistente.remove();
            
            let rawPos = dados.posicaoTatica || 'GL';
            let cleanPos = rawPos.replace(/[-\s]/g, '').toUpperCase();
            const coords = mapaTatico[cleanPos] || mapaTatico['GL'];
            
            const finalTop = overrideTop || coords.top;
            const finalLeft = overrideLeft || coords.left;
            
            const slot = document.createElement('div'); 
            slot.className = 'slot-jogador'; 
            
            const nomeAtleta = dados.nome || dados.jogador || "";
            if (nomeAtleta.includes('©')) { slot.classList.add('capitao-slot'); }
            
            slot.id = 'slot_index_' + dados.index; 
            slot.style.top = finalTop; 
            slot.style.left = finalLeft;
            slot.innerHTML = `<div class="slot-num">${dados.numero}</div><div class="slot-nome">${nomeAtleta}</div>`;
            
            campoView.appendChild(slot); 
            void slot.offsetWidth;
            slot.classList.add('placed');
        }

        function renderEscalacao(jogo) {
            try {
                if (!jogo || !jogo.eventoCard) return;
                if (jogo.eventoCard.timestamp === lastEventTimestamp) return;
                lastEventTimestamp = jogo.eventoCard.timestamp;
                const evento = jogo.eventoCard;

                if (evento.tipo === 'ESCALACAO_LISTA' || evento.tipo === 'RESERVAS_LISTA') {
                    playIntroAnimation(evento, () => {
                        const grid = document.getElementById('listaJogadoresGrid'); 
                        grid.innerHTML = '';
                        
                        if (evento.tipo === 'RESERVAS_LISTA') {
                            grid.style.display = 'grid';
                            grid.style.gridTemplateColumns = '1fr 1fr';
                            grid.style.columnGap = '20px';
                            document.getElementById('listaView').style.width = '900px';
                            document.getElementById('formacaoLabel').innerText = "BANCO DE RESERVAS";
                        } else {
                            grid.style.display = 'flex';
                            grid.style.flexDirection = 'column';
                            document.getElementById('listaView').style.width = '700px';
                            document.getElementById('formacaoLabel').innerText = "TÁTICA: " + evento.formacao;
                        }

                        if(evento.jogadores && Array.isArray(evento.jogadores)) {
                            evento.jogadores.forEach(jog => { 
                                grid.innerHTML += `<div class="lista-item"><div class="lista-num">${jog.numero}</div><div class="lista-nome">${jog.nome}</div></div>`; 
                            });
                        }
                        
                        document.getElementById('tecNomeLista').innerText = "TÉC: " + (evento.tecnico || "NÃO INFORMADO");
                        listaView.classList.add('show');
                    });
                } 
                else if (evento.tipo === 'CAMPO_TODOS') {
                    playIntroAnimation(evento, () => {
                        document.getElementById('tec-box-campo').innerText = "TÉC: " + (evento.tecnico || "NÃO INFORMADO");
                        document.querySelectorAll('.slot-jogador').forEach(el => el.remove());
                        campoView.classList.add('show');
                        
                        const linhas = {};
                        if(evento.jogadores && Array.isArray(evento.jogadores)) {
                            evento.jogadores.forEach(jog => {
                                let rawPos = jog.posicaoTatica || 'GL';
                                let cleanPos = rawPos.replace(/[-\s]/g, '').toUpperCase();
                                let coords = mapaTatico[cleanPos] || mapaTatico['GL'];
                                if (!linhas[coords.top]) linhas[coords.top] = [];
                                linhas[coords.top].push({ dados: jog, baseLeft: parseFloat(coords.left), top: coords.top });
                            });
                        }

                        const distribuicao = {
                            1: ['50%'], 2: ['33%', '67%'], 3: ['22%', '50%', '78%'],
                            4: ['16%', '38.6%', '61.3%', '84%'], 5: ['10%', '30%', '50%', '70%', '90%']
                        };

                        let delayGlobal = 0;
                        Object.keys(linhas).forEach(topVal => {
                            let jogadoresLinha = linhas[topVal];
                            jogadoresLinha.sort((a, b) => a.baseLeft - b.baseLeft); 
                            let count = jogadoresLinha.length;
                            let percentuais = distribuicao[count] || distribuicao[5]; 

                            jogadoresLinha.forEach((item, index) => {
                                let calcLeft = percentuais[index] || '50%';
                                setTimeout(() => { criarMiniCard(item.dados, item.top, calcLeft); }, delayGlobal * 150); 
                                delayGlobal++;
                            });
                        });
                    });
                } 
                else if (evento.tipo === 'ESCALAR') {
                    ocultarTodasAsTelas();
                    document.documentElement.style.setProperty('--cor-time', evento.cor);
                    document.getElementById('escudoHeader').src = evento.escudo; 
                    document.getElementById('nomeHeader').innerText = evento.time;
                    
                    document.getElementById('headerTime').classList.add('visible'); 
                    campoView.classList.add('show');
                    document.getElementById('tec-box-campo').innerText = "TÉC: " + (evento.tecnico || "NÃO INFORMADO");
                    
                    document.getElementById('hl-num').innerText = evento.numero; 
                    document.getElementById('hl-nome').innerText = evento.jogador;
                    highlightCard.classList.add('show');
                    
                    if(currentHighlightTimer) clearTimeout(currentHighlightTimer);
                    currentHighlightTimer = setTimeout(() => { 
                        highlightCard.classList.remove('show'); 
                        setTimeout(() => { criarMiniCard(evento); }, 400); 
                    }, 1500);
                } 
                else if (evento.tipo === 'ARBITRAGEM_DINAMICA' || evento.tipo === 'ARBITRAGEM') {
                    ocultarTodasAsTelas();
                    
                    // Limpa e recria o título 3D
                    arbCard.innerHTML = '<div class="arb-titulo">👨‍⚖️ EQUIPE DE ARBITRAGEM</div>';
                    
                    if (evento.oficiais && Array.isArray(evento.oficiais)) {
                        const gridClass = evento.oficiais.length <= 4 ? 'arb-grid col-1' : 'arb-grid col-2';
                        let htmlGrid = `<div class="${gridClass}">`;
                        
                        evento.oficiais.forEach(oficial => {
                            let fUpper = (oficial.funcao || 'OFICIAL').toUpperCase();
                            let nLimpo = oficial.nome || '---';
                            
                            let emoji = "📢"; 
                            if(fUpper.includes("CENTRAL") || fUpper === "ÁRBITRO") emoji = "👨‍⚖️";
                            else if(fUpper.includes("ASSISTENTE") || fUpper.includes("BANDEIRA")) emoji = "🚩";
                            else if(fUpper.includes("VAR")) emoji = "🖥️";
                            else if(fUpper.includes("DELEGADO") || fUpper.includes("AVALIADOR")) emoji = "📋";

                            htmlGrid += `
                            <div class="arb-row">
                                <div class="arb-emoji">${emoji}</div>
                                <div class="arb-text">
                                    <div class="arb-cargo">${fUpper}</div>
                                    <div class="arb-nome">${nLimpo}</div>
                                </div>
                            </div>`;
                        });
                        htmlGrid += `</div>`;
                        arbCard.innerHTML += htmlGrid;
                    } else {
                        // Fallback Antigo 
                        arbCard.innerHTML += `
                        <div class="arb-grid col-2">
                            <div class="arb-row"><div class="arb-emoji">👨‍⚖️</div><div class="arb-text"><div class="arb-cargo">ÁRBITRO CENTRAL</div><div class="arb-nome">${evento.central || '---'}</div></div></div>
                            <div class="arb-row"><div class="arb-emoji">🚩</div><div class="arb-text"><div class="arb-cargo">ASSISTENTES</div><div class="arb-nome">${evento.ass1 || '---'}<br>${evento.ass2 || '---'}</div></div></div>
                            <div class="arb-row"><div class="arb-emoji">📢</div><div class="arb-text"><div class="arb-cargo">4º ÁRBITRO</div><div class="arb-nome">${evento.quarto || '---'}</div></div></div>
                            <div class="arb-row"><div class="arb-emoji">🖥️</div><div class="arb-text"><div class="arb-cargo">VAR</div><div class="arb-nome">${evento.var || '---'}</div></div></div>
                        </div>`;
                    }
                    
                    arbCard.classList.add('show');
                }
                else if (evento.tipo === 'LIMPAR_CAMPO') {
                    ocultarTodasAsTelas();
                    document.querySelectorAll('.slot-jogador').forEach(el => el.remove()); 
                }
                else if (evento.tipo === 'OCULTAR') {
                    ocultarTodasAsTelas();
                }
            } catch (error) {
                console.error("Erro ao renderizar a escalação:", error);
            }
        }

        // Modo Firebase
        db.ref('transmissao/vMixData').on('value', (snapshot) => {
            const dadosJogo = snapshot.val();
            if(dadosJogo) renderEscalacao(dadosJogo);
        });

        // Modo Local (Off-line)
        window.addEventListener('storage', (event) => {
            if (event.key === 'vMixDataLocal' && event.newValue) {
                const dadosJogo = JSON.parse(event.newValue);
                if(dadosJogo) renderEscalacao(dadosJogo);
            }
        });
    </script>
</body>
</html>
