<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Duelo Série A 2026 - Impacto Total</title>
    <style>
        /* RESET: Remove espaços padrões do navegador */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* BODY TRANSPARENTE: Fundamental para o vMix não ficar com fundo preto quando a arte for retirada */
        body, html {
            width: 100%; height: 100%; overflow: hidden;
            font-family: 'Arial Black', sans-serif;
            background-color: transparent; 
        }

        /* ENVELOPE PRINCIPAL: Controla a visibilidade da arte (Show/Hide) */
        #main-wrapper {
            width: 100vw; height: 100vh; position: absolute; top: 0; left: 0;
            opacity: 0; transition: opacity 0.5s; display: none; background-color: #000;
        }
        #main-wrapper.show { opacity: 1; display: block; }

        /* ESTRUTURA: Define que os times ficam um ao lado do outro */
        #arena-duelo {
            display: flex; width: 100%; height: 100%; position: relative;
        }

        /* LADOS: Controla cada metade da tela */
        .lado {
            flex: 1; position: relative; overflow: hidden; display: flex;
            justify-content: center; align-items: center; 
            border-right: 2px solid rgba(255,255,255,0.1);
        }

        /* BANDEIRA DE FUNDO (MARCA D'ÁGUA) */
        .bandeira-img {
            position: absolute; width: 130%; height: 130%; object-fit: cover;
            opacity: 0.25; filter: blur(8px) grayscale(30%); 
            animation: moveBandeira 15s ease-in-out infinite; z-index: 1;
        }

        /* SOMBRAS DE VENTO */
        .dobras {
            position: absolute; width: 200%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,0,0,0.6), transparent, rgba(0,0,0,0.6), transparent);
            z-index: 2; animation: vento 6s linear infinite;
        }

        /* CONTEÚDO PRINCIPAL (ESCUDO + NOME) */
        .conteudo-time {
            position: relative; z-index: 5; display: flex; flex-direction: column;
            align-items: center; gap: 20px;
        }

        /* ESCUDO DE FRENTE */
        .logo-frente {
            width: 22vw; max-width: 350px; object-fit: contain;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.9)); opacity: 0;
        }
        /* A animação só roda quando a classe .show for ativada */
        .show .logo-frente { 
            animation: entraLogo 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, floatLogo 4s ease-in-out infinite; 
            animation-delay: 0s, 1s; 
        }

        /* NOME DO TIME COMPLETO */
        .nome-time {
            font-size: 3.5vw; color: #fff; text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 3px 3px 15px rgba(0,0,0,1); text-align: center; line-height: 1.1; opacity: 0;
        }
        .show .nome-time { animation: entraNome 1s ease-out 0.5s forwards; }

        /* VERSUS: O design do "X" central */
        #versus-central {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10; font-size: 9rem; color: #fafafa;
            text-shadow: 0 0 20px #000, 0 0 40px #fff; font-style: italic; opacity: 0;
        }
        .show #versus-central { animation: versusImpact 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        #versus-central::after {
            content: ''; position: absolute; width: 500px; height: 8px;
            background: linear-gradient(90deg, transparent, #f89f18, transparent);
            top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-45deg); z-index: -1;
        }

        /* TOPO */
        #topo-info {
            position: absolute; top: 4%; width: 100%; text-align: center; z-index: 20; color: #fff;
            font-size: 1.8rem; letter-spacing: 12px; text-transform: uppercase; text-shadow: 0 0 15px #f3a71a, 2px 2px 5px #000;
        }

        /* --- BLOCO DE ANIMAÇÕES --- */
        @keyframes entraLogo { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes floatLogo { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
        @keyframes entraNome { 0% { transform: translateY(30px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        @keyframes moveBandeira { 0%, 100% { transform: scale(1.3) rotate(0deg); } 50% { transform: scale(1.35) rotate(2deg) translate(-15px, 10px); } }
        @keyframes versusImpact { 0% { transform: translate(-50%, -50%) scale(4); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        @keyframes vento { from { left: -100%; } to { left: 0%; } }
    </style>
</head>
<body>

    <div id="main-wrapper">
        <div id="topo-info">Brasileirão Betano 2026</div>
        <div id="versus-central">X</div>

        <div id="arena-duelo">
            <div class="lado" id="lado-a">
                <div class="dobras"></div> 
                <img src="" id="fundo-a" class="bandeira-img"> 
                <div class="conteudo-time">
                    <img src="" id="logo-a" class="logo-frente"> 
                    <div class="nome-time" id="nome-a">---</div> 
                </div>
            </div>

            <div class="lado" id="lado-b">
                <div class="dobras"></div>
                <img src="" id="fundo-b" class="bandeira-img"> 
                <div class="conteudo-time">
                    <img src="" id="logo-b" class="logo-frente" style="animation-delay: 0s, 2s;"> 
                    <div class="nome-time" id="nome-b">---</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAeWhpLh1tO_axQSDtckMVyoE-f4Egno8A",
            authDomain: "controladoravmixestadio.firebaseapp.com",
            databaseURL: "https://controladoravmixestadio-default-rtdb.firebaseio.com",
            projectId: "controladoravmixestadio",
            storageBucket: "controladoravmixestadio.firebasestorage.app",
            messagingSenderId: "381624685560",
            appId: "1:381624685560:web:61266ebc5e5031d717bc0d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let lastEventTimestamp = 0;
        const wrapper = document.getElementById('main-wrapper');

        function dispararAnimacao() {
            wrapper.classList.remove('show');
            void wrapper.offsetWidth; 
            wrapper.classList.add('show');
        }

        function renderConfronto(jogo) {
            if (!jogo || !jogo.eventoCard) return;
            if (jogo.eventoCard.timestamp === lastEventTimestamp) return;
            lastEventTimestamp = jogo.eventoCard.timestamp;
            const evento = jogo.eventoCard;

            if (evento.tipo === 'CONFRONTO') {
                document.getElementById('nome-a').innerText = evento.timeA;
                document.getElementById('logo-a').src = evento.escudoA;
                document.getElementById('fundo-a').src = evento.escudoA;
                document.getElementById('lado-a').style.backgroundColor = evento.corA;

                document.getElementById('nome-b').innerText = evento.timeB;
                document.getElementById('logo-b').src = evento.escudoB;
                document.getElementById('fundo-b').src = evento.escudoB;
                document.getElementById('lado-b').style.backgroundColor = evento.corB;

                dispararAnimacao();
            } else if (evento.tipo === 'OCULTAR') {
                wrapper.classList.remove('show');
            }
        }

        // --- BLOCO DE TIMES FIXOS COM CAMINHO LOCAL ---
        window.onload = () => {
            const jogoFixo = {
                eventoCard: {
                    timestamp: Date.now(),
                    tipo: 'CONFRONTO',
                    timeA: 'BOTAFOGO',
                    // Ajustado para padrão de URL local e barras corrigidas
                    escudoA: 'file:///C:/Users/Allan/Desktop/Nova%20pasta/escudos/Botafogo.png', 
                    corA: '#000000', 
                    timeB: 'INTERNACIONAL',
                    escudoB: 'file:///C:/Users/Allan/Desktop/Nova%20pasta/escudos/Internacional.png',
                    corB: '#E5050F'
                }
            };
            
            renderConfronto(jogoFixo);
        };

        /* // Escuta a Internet (Comentado para priorizar o fixo, mas mantido conforme solicitado)
        db.ref('transmissao/vMixData').on('value', (snapshot) => {
            const dadosJogo = snapshot.val();
            if(dadosJogo) renderConfronto(dadosJogo);
        });

        // Escuta a Memória Interna
        window.addEventListener('storage', (event) => {
            if (event.key === 'vMixDataLocal' && event.newValue) {
                const dadosJogo = JSON.parse(event.newValue);
                if(dadosJogo) renderConfronto(dadosJogo);
            }
        });
        */
    </script>
</body>
</html>
