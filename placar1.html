<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,800;0,900;1,900&display=swap');

        /* --- ESTILOS DO PLACAR (MODERNO E MODULAR) --- */
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background-color: #00FF00; /* Verde Chroma Key */
            display: flex; justify-content: center; align-items: flex-start; 
            font-family: 'Montserrat', sans-serif;
        }
        
        /* Animação de descida do placar inteiro */
        @keyframes slideDown {
            from { transform: translateY(-100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .scoreboard-wrapper { 
            margin-top: 45px; 
            display: flex; flex-direction: column; align-items: center; 
            z-index: 100;
            animation: slideDown 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        /* Agora a main-bar é invisível, apenas segura os blocos com um pequeno espaço (gap) */
        .main-bar { 
            display: flex; align-items: stretch; height: 75px; 
            gap: 4px; /* Espaço entre os blocos */
            position: relative;
        }

        /* Sombras padrão para todos os blocos */
        .bloco {
            box-shadow: 0 15px 30px rgba(0,0,0,0.8);
            border-top: 2px solid rgba(255,255,255,0.2); /* Brilho superior metálico */
            border-bottom: 2px solid rgba(0,0,0,0.8);
        }
        
        /* --- BLOCO DO CRONÔMETRO --- */
        .timer-section { 
            background: linear-gradient(180deg, #2a2a2a 0%, #050505 100%); 
            color: #fff; padding: 0 30px; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            min-width: 120px; 
            border-radius: 15px 0 0 15px; /* Arredondado só na esquerda */
            border-left: 2px solid rgba(255,255,255,0.1);
        }
        #tempo { font-family: 'Courier New', monospace; font-size: 2.6rem; font-weight: bold; color: #ffffff; text-shadow: 0 0 10px rgba(255,255,255,0.4); line-height: 1;}
        #periodo { font-size: 1rem; font-weight: 900; color: #f1c40f; letter-spacing: 2px; line-height: 1; margin-bottom: 2px;}
        
        /* --- BLOCOS DOS TIMES --- */
        .team-section { 
            display: flex; align-items: center; justify-content: center; padding: 0 40px; gap: 15px;
            color: white; font-size: 2.2rem; font-weight: 900; text-transform: uppercase; 
            transition: background 0.5s, color 0.5s; position: relative;
            min-width: 250px;
            /* Sombra interna para dar efeito de volume/profundidade */
            box-shadow: inset 0 0 40px rgba(0,0,0,0.6), 0 15px 30px rgba(0,0,0,0.8);
        }
        /* O texto do time ganha uma sombra preta forte para garantir leitura mesmo sem a função de contraste ligada */
        #timeA, #timeB { text-shadow: 2px 2px 5px rgba(0,0,0,0.9), -1px -1px 0 rgba(0,0,0,0.5); }
        .escudo-placar { width: 55px; height: 55px; object-fit: contain; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.8)); display: none; }
        
        /* --- BLOCOS DE GOL (CAIXA BRANCA) --- */
        .score-box { 
            background: linear-gradient(180deg, #ffffff 0%, #d4d4d4 100%); 
            color: #000; 
            display: flex; align-items: center; justify-content: center;
            padding: 0 25px; font-size: 3.5rem; font-weight: 900; min-width: 60px; 
            /* Sombra interna para parecer baixo-relevo */
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.2), inset 0 -5px 10px rgba(0,0,0,0.1), 0 15px 30px rgba(0,0,0,0.8);
            text-shadow: none; /* Sem contorno branco aqui, pois o fundo já é claro */
            border-top: 2px solid #fff;
        }

        /* --- BLOCO DE ACRÉSCIMO --- */
        #acrescimo-box { 
            background: linear-gradient(180deg, #f1c40f 0%, #e67e22 100%); 
            color: #000; font-weight: 900; padding: 0 20px; font-size: 2.2rem; 
            display: none; align-items: center; justify-content: center;
            border-radius: 0 15px 15px 0; /* Arredondado só na direita */
            border-top: 2px solid rgba(255,255,255,0.5);
            text-shadow: 1px 1px 0px rgba(255,255,255,0.5);
        }
        
        /* Expulsões (Cartões Vermelhos sobre o time) */
        .red-container { position: absolute; top: -18px; left: 0; right: 0; display: flex; gap: 6px; justify-content: center; z-index: 10; pointer-events: none;}
        .cartao-vermelho { width: 14px; height: 22px; background: linear-gradient(180deg, #ff4757 0%, #c0392b 100%); border: 2px solid #fff; border-radius: 4px; box-shadow: 0 4px 8px rgba(0,0,0,0.9); }

        /* ========================================================
           --- ESTILOS DOS CARDS GIGANTES DE TELÃO --- 
           ======================================================== */
        .cards-gigantes-wrapper {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(150%);
            opacity: 0; transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 80%; max-width: 1400px; display: flex; justify-content: center; z-index: 50;
        }
        .cards-gigantes-wrapper.visible { transform: translateX(-50%) translateY(0); opacity: 1; }

        .card-gol, .card-sub, .card-cartao, .card-estatistica {
            display: none; width: 100%;
            background: linear-gradient(90deg, rgba(10,10,10,0.98) 0%, rgba(30,30,30,0.95) 100%);
            border-radius: 25px; box-shadow: 0 25px 60px rgba(0,0,0,0.9);
        }

        /* --- CARD GOL --- */
        .card-gol {
            border: 5px solid var(--cor-time, #fff); 
            padding: 40px; align-items: center; justify-content: space-between;
        }
        .gol-logo { width: 180px; height: 180px; object-fit: contain; filter: drop-shadow(0 15px 20px rgba(0,0,0,0.8)); margin-right: 50px; }
        .gol-info { flex-grow: 1; text-align: left; border-left: 10px solid var(--cor-time, #fff); padding-left: 50px; }
        .gol-title { font-size: 4.5rem; font-weight: 900; color: #f1c40f; text-transform: uppercase; letter-spacing: 6px; margin: 0; text-shadow: 3px 3px 15px rgba(0,0,0,0.9); }
        .gol-team-name { font-size: 6rem; font-weight: 900; text-transform: uppercase; margin: 0; line-height: 1.1; text-shadow: 4px 4px 0px var(--cor-time, #555), 0 10px 20px rgba(0,0,0,0.8); color: #fff;}

        /* --- CARD SUBSTITUIÇÃO --- */
        .card-sub {
            border-top: 10px solid #3498db;
            padding: 40px 60px; flex-direction: column; align-items: center;
        }
        .sub-header { width: 100%; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid #444; padding-bottom: 25px; margin-bottom: 25px;}
        .sub-title { font-size: 3rem; font-weight: 900; color: #3498db; letter-spacing: 5px; margin: 0; text-transform: uppercase; text-shadow: 2px 2px 10px rgba(0,0,0,0.8);}
        .sub-logo { width: 100px; height: 100px; object-fit: contain; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));}
        .sub-players { width: 100%; display: flex; flex-direction: column; gap: 20px; }
        .player-row { display: flex; align-items: center; background: rgba(255,255,255,0.08); padding: 20px 40px; border-radius: 15px; box-shadow: inset 0 2px 5px rgba(255,255,255,0.1), 0 10px 20px rgba(0,0,0,0.5);}
        .icon-arrow { font-size: 3.5rem; font-weight: 900; margin-right: 40px; width: 60px; text-align: center; text-shadow: 2px 2px 5px rgba(0,0,0,0.5);}
        .arrow-red { color: #ff4757; } .arrow-green { color: #2ecc71; }
        .action-text { font-size: 2rem; color: #bbb; text-transform: uppercase; margin-right: 30px; width: 120px; font-weight: 800;}
        .player-name { font-size: 4rem; font-weight: 900; text-transform: uppercase; margin: 0; color: #fff; text-shadow: 2px 2px 10px rgba(0,0,0,0.8);}

        /* --- CARD CARTÃO --- */
        .card-cartao {
            border-left: 20px solid var(--cor-cartao, #fff);
            padding: 40px 60px; align-items: center; justify-content: flex-start;
        }
        .cartao-logo { width: 150px; height: 150px; object-fit: contain; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.8)); margin-right: 50px; }
        .cartao-info { flex-grow: 1; text-align: left; }
        .cartao-title { font-size: 3rem; font-weight: 900; color: var(--cor-cartao, #fff); text-transform: uppercase; letter-spacing: 5px; margin: 0 0 15px 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.8);}
        .cartao-player { font-size: 5.5rem; font-weight: 900; text-transform: uppercase; margin: 0; line-height: 1; color: #fff; text-shadow: 2px 2px 15px rgba(0,0,0,0.9);}

        /* --- CARD ESTATÍSTICA --- */
        .card-estatistica {
            border-top: 15px solid var(--cor-stat, #3498db);
            padding: 50px 80px; flex-direction: column; align-items: center; text-align: center;
        }
        .stat-title { font-size: 3rem; font-weight: 900; color: var(--cor-stat, #3498db); letter-spacing: 6px; margin: 0 0 15px 0; text-transform: uppercase; text-shadow: 2px 2px 10px rgba(0,0,0,0.8);}
        .stat-value { font-size: 7.5rem; font-weight: 900; text-transform: uppercase; margin: 0; line-height: 1; color: #fff; text-shadow: 0 15px 30px rgba(0,0,0,0.8);}

        .card-gol.active, .card-sub.active, .card-cartao.active, .card-estatistica.active { display: flex; }
    </style>
</head>
<body>
    
    <div class="scoreboard-wrapper">
        <div class="main-bar">
            <div class="timer-section bloco"><span id="periodo">1T</span><span id="tempo">00:00</span></div>
            
            <div class="team-section bloco" id="boxTimeA">
                <div id="redA" class="red-container"></div>
                <img id="escudoA" class="escudo-placar" src="">
                <span id="timeA">TIME A</span>
            </div>
            
            <div class="score-box bloco" id="golsA">0</div>
            
            <div class="score-box bloco" id="golsB">0</div>
            
            <div class="team-section bloco" id="boxTimeB">
                <div id="redB" class="red-container"></div>
                <span id="timeB">TIME B</span>
                <img id="escudoB" class="escudo-placar" src="">
            </div>
            
            <div id="acrescimo-box" class="bloco">+<span id="extra">0</span>'</div>
        </div>
    </div>

    <div class="cards-gigantes-wrapper" id="masterContainerCards">
        <div class="card-gol" id="painelGol">
            <img class="gol-logo" id="golLogo" src="" alt="Escudo">
            <div class="gol-info">
                <p class="gol-title">⚽ GOL DO</p>
                <p class="gol-team-name" id="golTime">TIME</p>
            </div>
        </div>
        
        <div class="card-sub" id="painelSub">
            <div class="sub-header">
                <h1 class="sub-title">⇄ SUBSTITUIÇÃO</h1>
                <img class="sub-logo" id="subLogo" src="" alt="Escudo">
            </div>
            <div class="sub-players">
                <div class="player-row" style="border-left: 8px solid #ff4757;">
                    <div class="icon-arrow arrow-red">▼</div><div class="action-text">SAI</div><div class="player-name" id="subSaiTxt">NOME SAI</div>
                </div>
                <div class="player-row" style="border-left: 8px solid #2ecc71;">
                    <div class="icon-arrow arrow-green">▲</div><div class="action-text">ENTRA</div><div class="player-name" id="subEntraTxt">NOME ENTRA</div>
                </div>
            </div>
        </div>

        <div class="card-cartao" id="painelCartao">
            <img class="cartao-logo" id="cartaoLogo" src="" alt="Escudo">
            <div class="cartao-info">
                <p class="cartao-title" id="cartaoTitulo">CARTÃO AMARELO</p>
                <p class="cartao-player" id="cartaoJogador">NOME DO JOGADOR</p>
            </div>
        </div>

        <div class="card-estatistica" id="painelEstatistica">
            <p class="stat-title" id="statTitulo">PÚBLICO TOTAL</p>
            <p class="stat-value" id="statValor">0</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
    const firebaseConfig = {
        apiKey: "AIzaSyAeWhpLh1tO_axQSDtckMVyoE-f4Egno8A",
        authDomain: "controladoravmixestadio.firebaseapp.com",
        databaseURL: "https://controladoravmixestadio-default-rtdb.firebaseio.com",
        projectId: "controladoravmixestadio",
        storageBucket: "controladoravmixestadio.firebasestorage.app",
        messagingSenderId: "381624685560",
        appId: "1:381624685560:web:61266ebc5e5031d717bc0d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function renderRedCards(idContainer, qty) {
        const container = document.getElementById(idContainer);
        container.innerHTML = '';
        for(let i=0; i < (qty || 0); i++) {
            container.innerHTML += '<div class="cartao-vermelho"></div>';
        }
    }

    // A mágica do contraste inteligente continua aqui!
    function obterCorContraste(hexcolor) {
        if (!hexcolor || hexcolor === 'transparent') return 'white'; // Padrão
        hexcolor = hexcolor.replace('#', '');
        var r = parseInt(hexcolor.substr(0, 2), 16);
        var g = parseInt(hexcolor.substr(2, 2), 16);
        var b = parseInt(hexcolor.substr(4, 2), 16);
        var yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
        return (yiq >= 128) ? 'black' : 'white';
    }

    function sincronizarPlacar(jogo) {
        if (!jogo) return;
        
        document.getElementById('tempo').innerText = jogo.tempo || "00:00";
        document.getElementById('periodo').innerText = jogo.periodo || "1T";
        document.getElementById('timeA').innerText = jogo.timeA || "";
        document.getElementById('golsA').innerText = jogo.golsA || "0";
        document.getElementById('timeB').innerText = jogo.timeB || "";
        document.getElementById('golsB').innerText = jogo.golsB || "0";

        const boxA = document.getElementById('boxTimeA');
        boxA.style.backgroundColor = jogo.corA || 'transparent';
        boxA.style.color = obterCorContraste(jogo.corA);

        const boxB = document.getElementById('boxTimeB');
        boxB.style.backgroundColor = jogo.corB || 'transparent';
        boxB.style.color = obterCorContraste(jogo.corB);
        
        const logoA = document.getElementById('escudoA');
        if (jogo.escudoA) { logoA.src = jogo.escudoA; logoA.style.display = 'block'; } else { logoA.style.display = 'none'; }
        
        const logoB = document.getElementById('escudoB');
        if (jogo.escudoB) { logoB.src = jogo.escudoB; logoB.style.display = 'block'; } else { logoB.style.display = 'none'; }

        renderRedCards('redA', jogo.redA);
        renderRedCards('redB', jogo.redB);

        const boxAcrescimo = document.getElementById('acrescimo-box');
        if (jogo.extra && parseInt(jogo.extra) > 0) {
            document.getElementById('extra').innerText = jogo.extra;
            boxAcrescimo.style.display = "flex";
        } else {
            boxAcrescimo.style.display = "none";
        }

        const containerCards = document.getElementById('masterContainerCards');
        const painelGol = document.getElementById('painelGol');
        const painelSub = document.getElementById('painelSub');
        const painelCartao = document.getElementById('painelCartao');
        const painelEstatistica = document.getElementById('painelEstatistica');

        if (!jogo.eventoCard || jogo.eventoCard.tipo === 'OCULTAR') {
            containerCards.classList.remove('visible');
        } 
        else if (jogo.eventoCard.tipo === 'GOL') {
            document.documentElement.style.setProperty('--cor-time', jogo.eventoCard.cor);
            document.getElementById('golLogo').src = jogo.eventoCard.escudo;
            document.getElementById('golLogo').style.display = jogo.eventoCard.escudo ? 'block' : 'none';
            document.getElementById('golTime').innerText = jogo.eventoCard.time;
            
            painelSub.classList.remove('active');
            painelCartao.classList.remove('active');
            painelEstatistica.classList.remove('active');
            painelGol.classList.add('active');
            containerCards.classList.add('visible');
        } 
        else if (jogo.eventoCard.tipo === 'SUB') {
            document.getElementById('subLogo').src = jogo.eventoCard.escudo;
            document.getElementById('subLogo').style.display = jogo.eventoCard.escudo ? 'block' : 'none';
            document.getElementById('subSaiTxt').innerText = jogo.eventoCard.sai;
            document.getElementById('subEntraTxt').innerText = jogo.eventoCard.entra;
            
            painelGol.classList.remove('active');
            painelCartao.classList.remove('active');
            painelEstatistica.classList.remove('active');
            painelSub.classList.add('active');
            containerCards.classList.add('visible');
        }
        else if (jogo.eventoCard.tipo === 'CARTAO') {
            document.documentElement.style.setProperty('--cor-cartao', jogo.eventoCard.corCartao);
            document.getElementById('cartaoLogo').src = jogo.eventoCard.escudo;
            document.getElementById('cartaoLogo').style.display = jogo.eventoCard.escudo ? 'block' : 'none';
            document.getElementById('cartaoTitulo').innerText = jogo.eventoCard.textoCartao;
            document.getElementById('cartaoJogador').innerText = jogo.eventoCard.jogador;
            
            painelGol.classList.remove('active');
            painelSub.classList.remove('active');
            painelEstatistica.classList.remove('active');
            painelCartao.classList.add('active');
            containerCards.classList.add('visible');
        }
        else if (jogo.eventoCard.tipo === 'ESTATISTICA') {
            const isPublico = jogo.eventoCard.info === 'PUBLICO';
            document.documentElement.style.setProperty('--cor-stat', isPublico ? '#2ecc71' : '#3498db');
            
            document.getElementById('statTitulo').innerText = isPublico ? "PÚBLICO TOTAL" : "RENDA DA PARTIDA";
            document.getElementById('statValor').innerText = jogo.eventoCard.valor;

            painelGol.classList.remove('active');
            painelSub.classList.remove('active');
            painelCartao.classList.remove('active');
            painelEstatistica.classList.add('active');
            containerCards.classList.add('visible');
        }
    }

    db.ref('transmissao/vMixData').on('value', (snapshot) => {
        const dadosJogo = snapshot.val();
        if(dadosJogo) sincronizarPlacar(dadosJogo);
    });
    </script>
</body>
</html>
